<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Styles -->
    <style>
        * {
            font-family: "Geist", sans-serif
        }
    </style>
    <title>Github Issue Tracker | Home</title>
</head>

<body>
    <header class="max-w-11/12 mx-auto ">
        <div class="navbar bg-base-100 shadow-sm px-7">
            <div class="flex-1">
                <img class="w-12" src="assets/github-logo.png" alt="">
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <i class="fa-brands fa-sistrix"></i>
                    <input type="search" required placeholder="Search" />
                </label>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>
</body>

</html>
