<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Styles -->
    <style>
        * {
            font-family: "Geist", sans-serif
        }
    </style>
    <title>Github Issue Tracker | Home</title>
</head>

<body class="bg-[#F8FAFC]">
    <!-- navbar -->
    <header class="max-w-11/12 mx-auto mb-14">
        <div class="navbar bg-base-100 shadow-sm px-7 flex justify-between">
            <div class="">
                <img class="w-12 max-sm:w-10" src="./assets/github-logo.png" alt="">
            </div>
            <!-- Search section -->
            <div class="flex gap-2">
                <label class="input max-sm:w-20">
                    <i class="fa-brands fa-sistrix"></i>
                    <input id="search-input" class="max-sm:text-[10px]" type="search" required placeholder="Search" />
                </label>
                <button id="search-btn" class="btn btn-primary max-sm:w-20 max-sm:text-[10px]">Search</button>
            </div>
        </div>
    </header>

    <main>
        <!-- filter section -->
        <section class="max-w-4/5 max-sm:max-w-11/12 bg-[#FFFFFF] shadow mx-auto flex gap-3 py-4 pl-4 mb-5">
            <button id="all-filter-btn" onclick="loadAllIssues()"
                class="btn sm:w-28 max-w-28 btn-primary hover:bg-black hover:text-white">All</button>
            <button id="open-filter-btn" onclick="loadOpenIssues()"
                class="btn sm:w-28 max-w-28 hover:bg-black hover:text-white">Open</button>
            <button id="closed-filter-btn" onclick="loadClosedIssues()"
                class="btn sm:w-28 max-w-28 hover:bg-black hover:text-white">Closed</button>
        </section>

        <!-- issues section -->
        <section
            class="max-w-4/5 max-sm:max-w-11/12 bg-[#FFFFFF] shadow mx-auto  flex justify-between items-center px-5 py-3 border-b-black mb-1">
            <div class="left">
                <div class=" flex gap-2.5 items-center">
                    <div class="img  rounded-full bg-[#4A00FF50] p-1.5">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="">
                        <h2 class="text-xl max-sm:text-[16px] font-semibold"><span id="total-issue">50</span> Issues
                        </h2>
                        <p class="text-[#64748B] max-sm:text-[14px]">Track and manage your project issues</p>
                    </div>

                </div>
            </div>
            <div class="right">
                <div class="flex gap-5">
                    <div class="flex gap-1.5">
                        <img src="./assets/Open-Status.png" alt="">
                        <p class="max-sm:text-[12px]">open</p>
                    </div>
                    <div class="flex gap-1.5">
                        <img class="" src="./assets/Closed- Status .png" alt="">
                        <p class="max-sm:text-[12px]">Closed</p>
                    </div>

                </div>
            </div>
        </section>

        <!-- Spinner section -->
        <div id="loading-spinner" class="my-6 flex hidden justify-center max-w-4/5 mx-auto">
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <!-- cards section -->
        <section class="max-w-4/5 max-sm:max-w-11/12 bg-[#FFFFFF] shadow mx-auto px-5 py-6">
            <div id="all-cards-container" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <!-- <div class="card bg-base-100 shadow-2xl  border-t-4 border-t-green-700 p-4 space-y-3.5">
                    <div class="flex justify-end"><div class="badge badge-soft badge-error">High</div></div>
                    <h2 class="text-[14px] font-semibold">Fix navigation menu on mobile devices</h2>
                    <p class="text-[12px] text-[#64748B] line-clamp-2">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
                    <div class="flex gap-1.5">
                        <div class="badge badge-soft badge-error max-w-[50%]"><i class="fa-solid fa-bug"></i> <span class="text-[12px]">BUG</span></div>
                        <div class="badge badge-soft badge-warning "><i class="fa-regular fa-life-ring"></i>  <span class="text-[12px]">HELP WANTED</span></div>
                        
                    </div>
                    <p  class="text-[12px] text-[#64748B] ">#1by john_doe</p>
                    <p  class="text-[12px] text-[#64748B] ">#1by john_doe</p>
                </div> -->
            </div>
        </section>
    </main>

    <!-- Modal section -->
    <section>
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        
    </section>
    <script src="script.js/home.js"></script>


</body>

</html>
